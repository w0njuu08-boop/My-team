<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d1a" />
  <title>🍜 나만의 배달</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #0d0d1a;
      color: white;
      min-height: 100vh;
    }
    #app { max-width: 520px; margin: 0 auto; }

    /* Header */
    .header {
      background: #13132a;
      border-bottom: 1px solid #1e1e3a;
      padding: 20px 20px env(safe-area-inset-top);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p { color: #6666aa; font-size: 12px; margin-top: 2px; }

    .content { padding: 16px; }

    /* Cards */
    .card {
      background: #13132a;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #1e1e3a;
      margin-bottom: 14px;
    }
    .card-label {
      font-size: 11px;
      color: #6666aa;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* Budget */
    .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .btn-text { font-size: 12px; color: #7c6af7; background: none; border: none; cursor: pointer; padding: 4px; }
    .budget-amount { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .budget-empty { color: #444466; font-size: 16px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-box { background: #0d0d1a; border-radius: 12px; padding: 10px; text-align: center; }
    .stat-label { font-size: 10px; color: #6666aa; margin-bottom: 4px; }
    .stat-value { font-size: 13px; font-weight: 700; }

    /* Form */
    input[type="text"], input[type="number"] {
      width: 100%;
      background: #ffffff;
      color: #111111;
      border: 1px solid #d0d0e0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input::placeholder { color: #aaaacc; }
    input:focus { border-color: #7c6af7; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .subtotal {
      font-size: 12px;
      color: #7c6af7;
      background: #1a1a3a;
      border-radius: 10px;
      padding: 8px 12px;
      margin-top: 8px;
      display: none;
    }
    .btn-primary {
      width: 100%;
      background: #7c6af7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-secondary {
      background: #1e1e3a;
      color: #aaaacc;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn-primary { margin-top: 10px; }
    .btn-row .btn-secondary { margin-top: 10px; }

    /* Summary */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .summary-box { background: #13132a; border-radius: 20px; padding: 16px; border: 1px solid #1e1e3a; text-align: center; }
    .summary-count { font-size: 22px; font-weight: 700; margin: 4px 0; }
    .summary-amount { font-size: 12px; margin-top: 2px; }

    /* Section */
    .section-title { font-size: 10px; color: #6666aa; text-transform: uppercase; letter-spacing: 2px; margin: 16px 0 8px; }

    /* Item Card */
    .item-card {
      background: #13132a;
      border: 1px solid #1e1e3a;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .item-card.ordered { opacity: 0.6; }
    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #3a3a6a;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 13px;
      color: white;
    }
    .check-btn.checked { background: #7c6af7; border-color: #7c6af7; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-detail { font-size: 12px; color: #6666aa; margin-top: 3px; }
    .item-right { text-align: right; flex-shrink: 0; }
    .item-total { font-weight: 700; font-size: 14px; }
    .item-actions { display: flex; gap: 4px; justify-content: flex-end; margin-top: 4px; }
    .item-actions button { font-size: 11px; color: #555580; background: none; border: none; cursor: pointer; padding: 2px; }
    .item-actions button:hover { color: #9988ff; }
    .item-actions .del-btn:hover { color: #ff6b8a; }

    /* Empty */
    .empty { text-align: center; padding: 48px 0; color: #444466; }
    .empty .emoji { font-size: 40px; margin-bottom: 12px; }

    .hidden { display: none; }
    .flex-save { display: flex; gap: 8px; }
    .btn-save {
      background: #7c6af7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:22px">🍜</span>
      <h1>나만의 배달</h1>
    </div>
    <p>먹고 싶은 것 다 적어두기</p>
  </div>

  <div class="content">
    <!-- Budget Card -->
    <div class="card">
      <div class="budget-header">
        <span class="card-label" style="margin-bottom:0">예산</span>
        <button class="btn-text" id="budgetToggleBtn" onclick="toggleBudgetEdit()">+ 입력</button>
      </div>
      <div id="budgetEditArea" class="hidden">
        <div class="flex-save">
          <input type="number" id="budgetInput" placeholder="예산 금액 입력" onkeydown="if(event.key==='Enter')saveBudget()" />
          <button class="btn-save" onclick="saveBudget()">저장</button>
        </div>
      </div>
      <div id="budgetDisplay">
        <div class="budget-amount" id="budgetAmount"><span class="budget-empty">예산을 입력하세요</span></div>
        <div id="statsArea" class="hidden">
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">전체 합계</div>
              <div class="stat-value" id="statTotal" style="color:#e8e0ff">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">주문완료</div>
              <div class="stat-value" id="statOrdered" style="color:#7c6af7">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">남은 예산</div>
              <div class="stat-value" id="statRemaining">-</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Form -->
    <div class="card">
      <div class="card-label" id="formLabel">음식 추가</div>
      <input type="text" id="foodName" placeholder="음식 이름 (예: 떡볶이, 치킨)" oninput="updateSubtotal()" />
      <div class="input-row">
        <input type="number" id="foodPrice" placeholder="음식 가격 (원)" oninput="updateSubtotal()" />
        <input type="number" id="foodDelivery" placeholder="배달비 (원)" oninput="updateSubtotal()" />
      </div>
      <div class="subtotal" id="subtotalBox">합계: <strong id="subtotalVal"></strong></div>
      <div class="btn-row">
        <button class="btn-primary" id="addBtn" onclick="addOrEditItem()">추가하기</button>
        <button class="btn-secondary hidden" id="cancelBtn" onclick="cancelEdit()">취소</button>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-grid hidden" id="summaryGrid">
      <div class="summary-box">
        <div class="stat-label">계획 중</div>
        <div class="summary-count" id="plannedCount">0개</div>
        <div class="summary-amount" style="color:#9988ff" id="plannedAmount"></div>
      </div>
      <div class="summary-box">
        <div class="stat-label">주문완료</div>
        <div class="summary-count" style="color:#7c6af7" id="orderedCount">0개</div>
        <div class="summary-amount" style="color:#7c6af7" id="orderedAmount"></div>
      </div>
    </div>

    <!-- Lists -->
    <div id="emptyState" class="empty">
      <div class="emoji">🍽️</div>
      <p style="font-size:14px">먹고 싶은 음식을 추가해보세요</p>
    </div>
    <div id="plannedSection" class="hidden">
      <div class="section-title">🗒 먹을 예정</div>
      <div id="plannedList"></div>
    </div>
    <div id="orderedSection" class="hidden">
      <div class="section-title">✅ 주문완료</div>
      <div id="orderedList"></div>
    </div>
  </div>
</div>

<script>
const FOOD_EMOJI_MAP = [
  { keys: ["치킨","닭","윙","봉","텐더"], emoji: "🍗" },
  { keys: ["피자"], emoji: "🍕" },
  { keys: ["떡볶이","떡뽁이"], emoji: "🌶️" },
  { keys: ["짜장","짜장면","짬뽕","중화","탕수육","볶음밥"], emoji: "🥡" },
  { keys: ["초밥","스시","회","연어"], emoji: "🍣" },
  { keys: ["라면","라멘","우동","소바","국수","파스타","면"], emoji: "🍜" },
  { keys: ["버거","햄버거","샌드위치"], emoji: "🍔" },
  { keys: ["타코","부리또","멕시칸"], emoji: "🌮" },
  { keys: ["카레"], emoji: "🍛" },
  { keys: ["돈까스","돈가스","까스"], emoji: "🍱" },
  { keys: ["삼겹살","갈비","고기","구이","불고기"], emoji: "🥩" },
  { keys: ["보쌈","족발"], emoji: "🐷" },
  { keys: ["순대","국밥","설렁탕","갈비탕","삼계탕","육개장","찌개","된장","김치찌개"], emoji: "🍲" },
  { keys: ["샐러드"], emoji: "🥗" },
  { keys: ["케이크","디저트","마카롱","빵","베이커리"], emoji: "🎂" },
  { keys: ["아이스크림","아이스","빙수"], emoji: "🍨" },
  { keys: ["커피","카페","라떼"], emoji: "☕" },
  { keys: ["김밥","도시락"], emoji: "🍙" },
  { keys: ["쌀국수","태국","팟타이"], emoji: "🍜" },
  { keys: ["인도","난"], emoji: "🫓" },
];

function getFoodEmoji(name) {
  if (!name) return "";
  const lower = name.toLowerCase();
  for (const { keys, emoji } of FOOD_EMOJI_MAP) {
    if (keys.some(k => lower.includes(k))) return emoji;
  }
  return "";
}

function fmt(n) { return Number(n).toLocaleString("ko-KR") + "원"; }

let budget = null;
let items = [];
let editId = null;
let showBudgetEdit = false;

function load() {
  try {
    const b = localStorage.getItem("dp_budget");
    if (b !== null) budget = Number(b);
    const it = localStorage.getItem("dp_items");
    if (it) items = JSON.parse(it);
  } catch(e) {}
}

function save() {
  try {
    if (budget !== null) localStorage.setItem("dp_budget", String(budget));
    localStorage.setItem("dp_items", JSON.stringify(items));
  } catch(e) {}
}

function toggleBudgetEdit() {
  showBudgetEdit = !showBudgetEdit;
  const editArea = document.getElementById("budgetEditArea");
  const toggleBtn = document.getElementById("budgetToggleBtn");
  if (showBudgetEdit) {
    editArea.classList.remove("hidden");
    document.getElementById("budgetInput").value = budget !== null ? String(budget) : "";
    toggleBtn.textContent = "취소";
  } else {
    editArea.classList.add("hidden");
    toggleBtn.textContent = budget !== null ? "수정" : "+ 입력";
  }
}

function saveBudget() {
  const v = Number(document.getElementById("budgetInput").value);
  if (!isNaN(v) && v >= 0) {
    budget = v;
    save();
    showBudgetEdit = false;
    document.getElementById("budgetEditArea").classList.add("hidden");
    document.getElementById("budgetToggleBtn").textContent = "수정";
    render();
  }
}

function updateSubtotal() {
  const name = document.getElementById("foodName").value;
  const price = Number(document.getElementById("foodPrice").value) || 0;
  const delivery = Number(document.getElementById("foodDelivery").value) || 0;
  const box = document.getElementById("subtotalBox");
  if (name && price > 0) {
    box.style.display = "block";
    document.getElementById("subtotalVal").textContent = fmt(price + delivery);
  } else {
    box.style.display = "none";
  }
}

function addOrEditItem() {
  const name = document.getElementById("foodName").value.trim();
  const price = Number(document.getElementById("foodPrice").value);
  const delivery = Number(document.getElementById("foodDelivery").value) || 0;
  if (!name || !price || price <= 0) return;
  if (editId !== null) {
    items = items.map(it => it.id === editId ? { ...it, name, price, delivery } : it);
    editId = null;
  } else {
    items.push({ id: Date.now(), name, price, delivery, ordered: false });
  }
  document.getElementById("foodName").value = "";
  document.getElementById("foodPrice").value = "";
  document.getElementById("foodDelivery").value = "";
  document.getElementById("subtotalBox").style.display = "none";
  document.getElementById("addBtn").textContent = "추가하기";
  document.getElementById("formLabel").textContent = "음식 추가";
  document.getElementById("cancelBtn").classList.add("hidden");
  save();
  render();
}

function cancelEdit() {
  editId = null;
  document.getElementById("foodName").value = "";
  document.getElementById("foodPrice").value = "";
  document.getElementById("foodDelivery").value = "";
  document.getElementById("subtotalBox").style.display = "none";
  document.getElementById("addBtn").textContent = "추가하기";
  document.getElementById("formLabel").textContent = "음식 추가";
  document.getElementById("cancelBtn").classList.add("hidden");
}

function startEdit(id) {
  const item = items.find(it => it.id === id);
  if (!item) return;
  editId = id;
  document.getElementById("foodName").value = item.name;
  document.getElementById("foodPrice").value = String(item.price);
  document.getElementById("foodDelivery").value = String(item.delivery);
  document.getElementById("addBtn").textContent = "수정 완료";
  document.getElementById("formLabel").textContent = "✏️ 수정 중";
  document.getElementById("cancelBtn").classList.remove("hidden");
  updateSubtotal();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function toggleOrdered(id) {
  items = items.map(it => it.id === id ? { ...it, ordered: !it.ordered } : it);
  save();
  render();
}

function deleteItem(id) {
  items = items.filter(it => it.id !== id);
  save();
  render();
}

function makeItemCard(item) {
  const total = item.price + item.delivery;
  const emoji = getFoodEmoji(item.name);
  const div = document.createElement("div");
  div.className = "item-card" + (item.ordered ? " ordered" : "");
  div.innerHTML = `
    <button class="check-btn ${item.ordered ? "checked" : ""}" onclick="toggleOrdered(${item.id})">
      ${item.ordered ? "✓" : ""}
    </button>
    <div class="item-info">
      <div class="item-name">${emoji ? emoji + " " : ""}${escHtml(item.name)}</div>
      <div class="item-detail">
        음식 ${item.price.toLocaleString()}원${item.delivery > 0 ? " · 배달 " + item.delivery.toLocaleString() + "원" : ""}
      </div>
    </div>
    <div class="item-right">
      <div class="item-total" style="color:${item.ordered ? "#7c6af7" : "white"}">${total.toLocaleString()}원</div>
      <div class="item-actions">
        <button onclick="startEdit(${item.id})">수정</button>
        <span style="color:#333355">·</span>
        <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    </div>
  `;
  return div;
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render() {
  const totalAll = items.reduce((s, it) => s + it.price + it.delivery, 0);
  const totalOrdered = items.filter(it => it.ordered).reduce((s, it) => s + it.price + it.delivery, 0);
  const totalPlanned = items.filter(it => !it.ordered).reduce((s, it) => s + it.price + it.delivery, 0);
  const remaining = budget !== null ? budget - totalOrdered : null;

  // Budget display
  if (budget !== null) {
    document.getElementById("budgetAmount").textContent = fmt(budget);
    document.getElementById("statsArea").classList.remove("hidden");
    document.getElementById("statTotal").textContent = fmt(totalAll);
    document.getElementById("statOrdered").textContent = fmt(totalOrdered);
    const remEl = document.getElementById("statRemaining");
    remEl.textContent = fmt(remaining);
    remEl.style.color = remaining < 0 ? "#ff6b8a" : "#4fd1a5";
  } else {
    document.getElementById("budgetAmount").innerHTML = '<span class="budget-empty">예산을 입력하세요</span>';
    document.getElementById("statsArea").classList.add("hidden");
  }

  // Summary
  const summaryGrid = document.getElementById("summaryGrid");
  if (items.length > 0) {
    summaryGrid.classList.remove("hidden");
    const planned = items.filter(i => !i.ordered);
    const ordered = items.filter(i => i.ordered);
    document.getElementById("plannedCount").textContent = planned.length + "개";
    document.getElementById("plannedAmount").textContent = fmt(totalPlanned);
    document.getElementById("orderedCount").textContent = ordered.length + "개";
    document.getElementById("orderedAmount").textContent = fmt(totalOrdered);
  } else {
    summaryGrid.classList.add("hidden");
  }

  // Lists
  const planned = items.filter(it => !it.ordered);
  const ordered = items.filter(it => it.ordered);

  document.getElementById("emptyState").classList.toggle("hidden", items.length > 0);

  const plannedSection = document.getElementById("plannedSection");
  const plannedList = document.getElementById("plannedList");
  plannedList.innerHTML = "";
  if (planned.length > 0) {
    plannedSection.classList.remove("hidden");
    planned.forEach(it => plannedList.appendChild(makeItemCard(it)));
  } else {
    plannedSection.classList.add("hidden");
  }

  const orderedSection = document.getElementById("orderedSection");
  const orderedList = document.getElementById("orderedList");
  orderedList.innerHTML = "";
  if (ordered.length > 0) {
    orderedSection.classList.remove("hidden");
    ordered.forEach(it => orderedList.appendChild(makeItemCard(it)));
  } else {
    orderedSection.classList.add("hidden");
  }
}

load();
render();
</script>
</body>
</html>
